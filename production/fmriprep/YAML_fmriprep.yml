# Arguments in `singularity run`:
singularity_run:
    -w: "$BABS_TMPDIR"   # this is a placeholder for temporary workspace
    --n_cpus: '16'
    --omp-nthreads: '4'
    --stop-on-first-crash: ""   # argument without value
    --fs-license-file: "/home/gabridele/license.txt"
    --skip-bids-validation: Null  # Null or NULL is also a placeholder for argument without value
    --output-spaces: MNI152NLin6Asym:res-2
    --force: "bbr"
    --cifti-output: 91k
    --notrack: ""
    --resource-monitor: ""
    -v: '-v'   # this is for double `-v`

# Output foldername(s) to be zipped, and the BIDS App version to be included in the zip filename(s):
zip_foldernames:
    $TO_CREATE_FOLDER: "true"
    fmriprep: "25-1-1"

# How much cluster resources it needs:
cluster_resources:
    interpreting_shell: /bin/bash
    hard_memory_limit: 30G
    number_of_cpus: "16"
    hard_runtime_limit: '24:00:00'

# Necessary commands to be run first:
script_preamble: |
    module load GCC/12.2.0
    module load Anaconda3/2022.05
    source /sw/easybuild_milan/software/Anaconda3/2022.05/bin/activate ~/.conda/envs/babs_2402
    module load OpenMPI/4.1.4
    module load ANTs/2.5.0
    module --ignore_cache load "FreeSurfer/7.3.2-centos8_x86_64"

# Where to run the jobs:
job_compute_space: "$SNIC_TMP"   # COSMOS-SENS TEMP FOLDER

alert_log_messages:
    stdout:
        - "Exception: No T1w images found for"  # not needed if setting T1w in `required_files`
        - "Excessive topologic defect encountered"
        - "Cannot allocate memory"
        - "mris_curvature_stats: Could not open file"
        - "Numerical result out of range"
        - "fMRIPrep failed"
